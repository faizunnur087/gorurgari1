---
- name: Deploy gorurgari1
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_port: 8000
    python_version: '3.11'
    entrypoint: 'app.main:app'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Python runtime ────────────────────────────────────────────────────────
    - name: Install Python and pip
      apt:
        name:
          - "python{{ python_version }}"
          - "python{{ python_version }}-pip"
          - "python{{ python_version }}-venv"
        state: present

    # ── Nginx ─────────────────────────────────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Create Python virtual environment
      command: "python{{ python_version }} -m venv {{ app_dir }}/venv"
      args:
        creates: "{{ app_dir }}/venv"

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"

    - name: Create .env file
      shell: |
        printf '' > {{ app_dir }}/.env
        printf 'PORT={{ app_port }}\nAPP_ENV=production\n' >> {{ app_dir }}/.env
      args:
        executable: /bin/bash

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} FastAPI app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/venv/bin/gunicorn {{ entrypoint }} \
            --workers 2 --worker-class uvicorn.workers.UvicornWorker \
            --bind 0.0.0.0:{{ app_port }} --timeout 120
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload and start Nginx
      service:
        name: nginx
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted
